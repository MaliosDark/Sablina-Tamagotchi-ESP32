<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨ Sablina Animation Studio</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/omggif@1.0.10/omggif.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050812;
      --s1:        rgba(10, 15, 35, 0.88);
      --s2:        rgba(18, 25, 55, 0.75);
      --border:    rgba(110, 60, 230, 0.22);
      --border-hi: rgba(150, 90, 255, 0.55);
      --primary:   #7c3aed;
      --p-light:   #a855f7;
      --accent:    #06b6d4;
      --a-light:   #22d3ee;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --success:   #10b981;
      --warn:      #f59e0b;
      --err:       #ef4444;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    #root {
      position: relative; z-index: 1;
      min-height: 100vh;
    }

    /* ── App shell ── */
    .app { max-width: 1120px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── Header ── */
    .app-header {
      display: flex; align-items: center; gap: 14px;
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none; color: var(--muted);
      padding: 7px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .83rem;
      background: var(--s1); transition: all .2s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--primary); box-shadow: 0 0 16px rgba(124,58,237,.35); }

    .app-title {
      font-size: 1.9rem; font-weight: 800; letter-spacing: -.5px;
      background: linear-gradient(135deg, #a855f7 0%, #22d3ee 50%, #a855f7 100%);
      background-size: 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: gradShift 5s ease infinite;
    }
    @keyframes gradShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .subtitle { color: var(--muted); font-size: .85rem; margin-left: auto; }

    /* ── Tab bar ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 24px; }
    .tab-btn {
      padding: 9px 20px; border-radius: 22px; font-size: .88rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--s1); color: var(--muted);
      transition: all .2s;
    }
    .tab-btn:hover { color: var(--text); border-color: var(--primary); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border-color: transparent;
      box-shadow: 0 0 20px rgba(124,58,237,.4);
    }

    /* ── Glass card ── */
    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      backdrop-filter: blur(12px);
      transition: border-color .2s, box-shadow .2s;
    }
    .card:hover { border-color: rgba(110,60,230,.45); box-shadow: 0 4px 30px rgba(80,40,200,.12); }

    .card-title {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted); margin-bottom: 12px;
    }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border-hi);
      border-radius: 16px; padding: 48px 24px;
      text-align: center; cursor: pointer;
      background: rgba(124,58,237,.04);
      transition: all .25s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(6,182,212,.07);
      box-shadow: 0 0 30px rgba(6,182,212,.15);
    }
    .drop-zone .dz-icon { font-size: 3rem; line-height: 1; margin-bottom: 12px; }
    .drop-zone .dz-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .drop-zone .dz-sub { font-size: .82rem; color: var(--muted); }
    .drop-zone input { display: none; }

    /* ── Settings grid ── */
    .settings-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: .75rem; color: var(--muted); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .field input, .field select {
      padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--s2);
      color: var(--text); font-size: .88rem; outline: none; transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(6,182,212,.15); }

    /* ── Frame strip ── */
    .frame-strip {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 8px; scroll-snap-type: x proximity;
    }
    .frame-strip::-webkit-scrollbar { height: 4px; }
    .frame-strip::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

    .frame-thumb {
      flex: 0 0 auto; cursor: pointer; border-radius: 8px; overflow: hidden;
      border: 2px solid var(--border); transition: all .18s; scroll-snap-align: start;
      position: relative;
    }
    .frame-thumb:hover { border-color: var(--accent); box-shadow: 0 0 12px rgba(6,182,212,.3); }
    .frame-thumb.selected { border-color: var(--p-light); box-shadow: 0 0 14px rgba(168,85,247,.4); }
    .frame-thumb img { display: block; width: 72px; height: 72px; object-fit: contain; image-rendering: pixelated; }
    .frame-thumb .frame-num {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(5,8,18,.75); font-size: .62rem; color: var(--muted);
      text-align: center; padding: 2px 0;
    }

    /* ── Preview canvas ── */
    .preview-wrap {
      display: flex; justify-content: center; align-items: center;
      padding: 16px;
      background: #000; border-radius: 10px; border: 1px solid var(--border);
      min-height: 120px;
    }
    .preview-wrap canvas { image-rendering: pixelated; border-radius: 4px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 10px; font-size: .88rem; font-weight: 700;
      cursor: pointer; border: none; transition: all .2s; white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #6d28d9);
      color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,.35);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,58,237,.5); }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #0891b2);
      color: #fff; box-shadow: 0 4px 16px rgba(6,182,212,.3);
    }
    .btn-accent:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(6,182,212,.45); }
    .btn-ghost {
      background: var(--s2); border: 1px solid var(--border); color: var(--muted);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }
    .btn:disabled { opacity: .45; pointer-events: none; }

    .btn-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

    /* ── Output ── */
    .output-area {
      background: #020409; border: 1px solid var(--border);
      border-radius: 10px; padding: 0; overflow: hidden;
    }
    .output-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      background: var(--s2);
    }
    .output-header .fn { font-size: .8rem; color: var(--accent); font-family: monospace; }
    .output-stats { font-size: .75rem; color: var(--muted); margin-left: auto; }
    .output-code {
      max-height: 280px; overflow-y: auto; padding: 14px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: .72rem; line-height: 1.5; color: #c9d1d9; white-space: pre;
    }
    .output-code::-webkit-scrollbar { width: 4px; }
    .output-code::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

    /* ── Library ── */
    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .group-card { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .group-header {
      padding: 10px 16px;
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: .85rem;
    }
    .group-body { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
    .anim-chip {
      display: inline-block; padding: 4px 10px;
      border-radius: 20px; font-size: .73rem; font-family: monospace;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      color: var(--muted); transition: all .15s; cursor: default;
    }
    .anim-chip:hover { color: var(--text); border-color: var(--border-hi); }

    .filter-input {
      width: 100%; padding: 10px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--s2);
      color: var(--text); font-size: .88rem; outline: none; margin-bottom: 18px;
      transition: border-color .2s;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--muted); }

    /* ── Progress ── */
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--p-light); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar-wrap { height: 4px; background: var(--s2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width .2s; }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 20px; border-radius: 10px; font-size: .85rem; font-weight: 600;
      backdrop-filter: blur(12px); animation: toastIn .25s ease;
      pointer-events: all;
      max-width: 340px;
    }
    .toast.success { background: rgba(16,185,129,.18); border: 1px solid #10b981; color: #6ee7b7; }
    .toast.error   { background: rgba(239,68,68,.18); border: 1px solid #ef4444; color: #fca5a5; }
    .toast.info    { background: rgba(124,58,237,.18); border: 1px solid #7c3aed; color: #c4b5fd; }
    @keyframes toastIn { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

    /* ── Misc ── */
    .section { margin-bottom: 20px; }
    .gap { display: flex; flex-direction: column; gap: 16px; }
    .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
    .tag { display: inline-block; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; padding: 3px 8px; border-radius: 5px; }
    .dim-badge { color: var(--accent); font-family: monospace; font-size: .82rem; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="root"></div>

<!-- ═══════════════════════════════════ THREE.JS ═══════════════════════════════════ -->
<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050812);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 90;

  // ── Particles ──
  const N = 450;
  const pos = [], col = [];
  const c = new THREE.Color();
  for (let i = 0; i < N; i++) {
    pos.push((Math.random() - .5) * 220, (Math.random() - .5) * 130, (Math.random() - .5) * 70);
    const isPurple = Math.random() < .55;
    c.setHSL(isPurple ? .72 + Math.random() * .1 : .53 + Math.random() * .06, .85, .55 + Math.random() * .3);
    col.push(c.r, c.g, c.b);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
  const ptsMat = new THREE.PointsMaterial({ size: .9, vertexColors: true, transparent: true, opacity: .75 });
  const pts = new THREE.Points(geo, ptsMat);
  scene.add(pts);

  // ── Connecting lines (static, computed once) ──
  const lPos = [], lCol = [];
  const MAXD = 28;
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const dx = pos[i*3]-pos[j*3], dy = pos[i*3+1]-pos[j*3+1], dz = pos[i*3+2]-pos[j*3+2];
      const d = Math.sqrt(dx*dx+dy*dy+dz*dz);
      if (d < MAXD) {
        const a = (1 - d / MAXD) * .4;
        lPos.push(pos[i*3],pos[i*3+1],pos[i*3+2], pos[j*3],pos[j*3+1],pos[j*3+2]);
        lCol.push(.48,.22,.9,a,  .48,.22,.9,a);
      }
    }
  }
  if (lPos.length) {
    const lg = new THREE.BufferGeometry();
    lg.setAttribute('position', new THREE.Float32BufferAttribute(lPos, 3));
    const lm = new THREE.LineBasicMaterial({ vertexColors: false, color: 0x6622cc, transparent: true, opacity: .18 });
    scene.add(new THREE.LineSegments(lg, lm));
  }

  // ── Mouse parallax ──
  let mx = 0, my = 0;
  window.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth - .5) * 2;
    my = (e.clientY / window.innerHeight - .5) * 2;
  });

  // ── Animate ──
  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    t += .0008;
    pts.rotation.y = t + mx * .04;
    pts.rotation.x = t * .4 + my * .03;
    ptsMat.opacity = .6 + Math.sin(t * 3) * .1;
    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>

<!-- ═══════════════════════════════════ REACT ═══════════════════════════════════ -->
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Animation groups ──
const GROUPS = [
  { name: '🐾 Character', color: '#a855f7', bg: 'rgba(168,85,247,.12)',
    items: ['sablinagif','sablinasleep','gamewalk','freg'] },
  { name: '🍱 Eating', color: '#f97316', bg: 'rgba(249,115,22,.12)',
    items: ['eatgif','sablinaeat','sablinaeat2','sablinaeat3','sablinaeat4','sablinaeat5','sablinaeat6','sablinaeat7','sablinaeat8','sablinaeat9','sablinaeat10','sablinaeat11','sushi'] },
  { name: '🏠 Rooms', color: '#06b6d4', bg: 'rgba(6,182,212,.12)',
    items: ['roomblack','roomblue','roomgray','roomgreen','roomred','roomwhite'] },
  { name: '🌿 Nature', color: '#22c55e', bg: 'rgba(34,197,94,.12)',
    items: ['forest1','forest2','gardengif'] },
  { name: '⚡ Activities', color: '#3b82f6', bg: 'rgba(59,130,246,.12)',
    items: ['cleangif','colorgif','gamegif','sleepgif'] },
  { name: '📦 Items & Props', color: '#f59e0b', bg: 'rgba(245,158,11,.12)',
    items: ['baby','box','computer','door','salida','shop','watercooler','weber','pancho','pest','warn'] },
  { name: '🖼 Pictures', color: '#ec4899', bg: 'rgba(236,72,153,.12)',
    items: ['picture0','picture1'] },
  { name: '🎞 Frames', color: '#8b5cf6', bg: 'rgba(139,92,246,.12)',
    items: Array.from({length:22},(_,i)=>`f${String(i+1).padStart(2,'0')}`) },
];

// ── Utils ──
function rgb565(r,g,b) { return ((r&0xF8)<<8)|((g&0xFC)<<3)|(b>>3); }

function canvasToRgb565(canvas, tw, th) {
  const dst = document.createElement('canvas');
  dst.width = tw; dst.height = th;
  dst.getContext('2d').drawImage(canvas, 0, 0, tw, th);
  const { data } = dst.getContext('2d').getImageData(0, 0, tw, th);
  const out = [];
  for (let i = 0; i < data.length; i += 4)
    out.push('0x' + rgb565(data[i],data[i+1],data[i+2]).toString(16).toUpperCase().padStart(4,'0'));
  return out;
}

function buildHeader(rgb565Frames, varName, tw, th) {
  const fs = tw * th;
  let h = `// Generated by Sablina Animation Studio\n`;
  h += `// ${rgb565Frames.length} frame(s), ${tw}x${th} pixels (${fs} uint16 per frame)\n`;
  h += `#pragma once\n\n`;
  h += `const unsigned short PROGMEM ${varName}[][${fs}] = {\n`;
  rgb565Frames.forEach((f, i) => {
    h += `  {${f.join(',')}}`;
    if (i < rgb565Frames.length - 1) h += ',';
    h += '\n';
  });
  h += '};\n';
  return h;
}

async function decodeGif(file, maxFrames) {
  const buf = await file.arrayBuffer();
  const gr = new GifReader(new Uint8Array(buf));
  const W = gr.width, H = gr.height;
  const frames = [];
  const n = Math.min(gr.numFrames(), maxFrames);
  for (let i = 0; i < n; i++) {
    const pixels = new Uint8Array(W * H * 4);
    gr.decodeAndBlitFrameRGBA(i, pixels);
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const id = c.getContext('2d').createImageData(W, H);
    id.data.set(pixels);
    c.getContext('2d').putImageData(id, 0, 0);
    frames.push({ canvas: c, delay: (gr.frameInfo(i).delay || 10) * 10 });
  }
  return frames;
}

async function decodeVideo(file, fps, maxFrames, onProgress) {
  const url = URL.createObjectURL(file);
  const video = document.createElement('video');
  video.muted = true;
  video.src = url;
  await new Promise(r => { video.onloadedmetadata = r; });
  const dur = video.duration;
  const total = Math.min(Math.floor(dur * fps), maxFrames);
  const frames = [];
  for (let i = 0; i < total; i++) {
    video.currentTime = i / fps;
    await new Promise(r => { video.onseeked = r; });
    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0);
    frames.push({ canvas: c, delay: Math.round(1000 / fps) });
    onProgress && onProgress((i + 1) / total);
  }
  URL.revokeObjectURL(url);
  return frames;
}

async function decodeImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.src = url;
  await new Promise(r => { img.onload = r; });
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  c.getContext('2d').drawImage(img, 0, 0);
  URL.revokeObjectURL(url);
  return [{ canvas: c, delay: 100 }];
}

// ── Toast ──
function Toast({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// ── DropZone ──
function DropZone({ onFile, disabled }) {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef();

  const handleDrop = e => {
    e.preventDefault(); setDrag(false);
    const f = e.dataTransfer.files[0];
    if (f) onFile(f);
  };
  const handleInput = e => {
    const f = e.target.files[0];
    if (f) onFile(f);
    e.target.value = '';
  };

  return (
    <div
      className={`drop-zone${drag?' drag-over':''}`}
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={handleDrop}
      onClick={()=>!disabled&&inputRef.current.click()}
    >
      <div className="dz-icon">🎞</div>
      <div className="dz-title">Drop your animation here</div>
      <div className="dz-sub">Supports GIF · MP4 · WebM · MOV · PNG · JPG · JPEG</div>
      <input ref={inputRef} type="file" accept=".gif,.mp4,.webm,.mov,.png,.jpg,.jpeg,image/*,video/*" onChange={handleInput} />
    </div>
  );
}

// ── FrameStrip ──
function FrameStrip({ frames, selected, onSelect }) {
  return (
    <div className="frame-strip">
      {frames.map((f, i) => (
        <div key={i} className={`frame-thumb${selected===i?' selected':''}`} onClick={()=>onSelect(i)}>
          <img src={f.thumb} alt={`frame ${i+1}`} />
          <div className="frame-num">#{i+1} · {f.delay}ms</div>
        </div>
      ))}
    </div>
  );
}

// ── Settings ──
function SettingsPanel({ s, onChange }) {
  const upd = (k, v) => onChange({ ...s, [k]: v });
  return (
    <div className="settings-grid">
      <div className="field">
        <label>Variable Name</label>
        <input value={s.varName} onChange={e=>upd('varName',e.target.value.replace(/\W/g,'_'))} placeholder="my_anim" />
      </div>
      <div className="field">
        <label>Width (px)</label>
        <input type="number" min="1" max="320" value={s.width} onChange={e=>upd('width',+e.target.value||100)} />
      </div>
      <div className="field">
        <label>Height (px)</label>
        <input type="number" min="1" max="320" value={s.height} onChange={e=>upd('height',+e.target.value||100)} />
      </div>
      <div className="field">
        <label>Max Frames</label>
        <input type="number" min="1" max="200" value={s.maxFrames} onChange={e=>upd('maxFrames',+e.target.value||30)} />
      </div>
      <div className="field">
        <label>Video FPS</label>
        <input type="number" min="1" max="60" value={s.fps} onChange={e=>upd('fps',+e.target.value||10)} />
      </div>
      <div className="field">
        <label>Color Mode</label>
        <select value={s.colorMode} onChange={e=>upd('colorMode',e.target.value)}>
          <option value="rgb565">RGB565 (standard)</option>
          <option value="bgr565">BGR565 (swap R/B)</option>
          <option value="grayscale">Grayscale → 565</option>
        </select>
      </div>
    </div>
  );
}

// ── Output ──
function OutputPanel({ code, filename, onDownload, onCopy }) {
  const bytes = new Blob([code]).size;
  const lines = code.split('\n').length;
  return (
    <div className="output-area">
      <div className="output-header">
        <span>📄</span>
        <span className="fn">{filename}</span>
        <span className="output-stats">{lines} lines · {(bytes/1024).toFixed(1)} KB</span>
      </div>
      <pre className="output-code">{code.slice(0, 6000)}{code.length > 6000 ? '\n... (truncated in preview, full file on download) ...' : ''}</pre>
      <div style={{padding:'12px', display:'flex', gap:'10px'}}>
        <button className="btn btn-primary" onClick={onDownload}>⬇ Download {filename}</button>
        <button className="btn btn-ghost" onClick={onCopy}>📋 Copy</button>
      </div>
    </div>
  );
}

// ── Convert Tab ──
function ConvertTab({ addToast }) {
  const [rawFrames, setRawFrames] = useState([]);   // {canvas, delay}
  const [thumbFrames, setThumbFrames] = useState([]); // {thumb (dataURL), delay}
  const [selected, setSelected] = useState(0);
  const [settings, setSettings] = useState({ varName:'myanim', width:100, height:100, fps:10, maxFrames:30, colorMode:'rgb565' });
  const [processing, setProcessing] = useState(false);
  const [progress, setProgress] = useState(0);
  const [output, setOutput] = useState('');
  const [fileName, setFileName] = useState('');
  const previewRef = useRef();

  const applyPixelTransform = useCallback((canvas, tw, th, mode) => {
    const dst = document.createElement('canvas');
    dst.width = tw; dst.height = th;
    dst.getContext('2d').drawImage(canvas, 0, 0, tw, th);
    const ctx = dst.getContext('2d');
    if (mode === 'grayscale') {
      const id = ctx.getImageData(0,0,tw,th);
      for (let i=0;i<id.data.length;i+=4){
        const g = id.data[i]*.299+id.data[i+1]*.587+id.data[i+2]*.114;
        id.data[i]=id.data[i+1]=id.data[i+2]=g;
      }
      ctx.putImageData(id,0,0);
    }
    return dst;
  }, []);

  // Draw selected frame in preview canvas
  useEffect(() => {
    if (!rawFrames[selected] || !previewRef.current) return;
    const c = rawFrames[selected].canvas;
    const tw = settings.width, th = settings.height;
    const dst = applyPixelTransform(c, tw, th, settings.colorMode);
    const ctx = previewRef.current.getContext('2d');
    previewRef.current.width = tw;
    previewRef.current.height = th;
    ctx.drawImage(dst, 0, 0);
  }, [selected, rawFrames, settings, applyPixelTransform]);

  async function handleFile(file) {
    setOutput('');
    setProgress(0);
    setProcessing(true);
    try {
      let decoded;
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'gif') {
        decoded = await decodeGif(file, settings.maxFrames);
      } else if (['mp4','webm','mov','avi','mkv'].includes(ext) || file.type.startsWith('video/')) {
        decoded = await decodeVideo(file, settings.fps, settings.maxFrames, p=>setProgress(p));
      } else {
        decoded = await decodeImage(file);
      }
      setRawFrames(decoded);
      // Generate thumbnails
      setThumbFrames(decoded.map(f => {
        const c = document.createElement('canvas');
        c.width = 72; c.height = 72;
        c.getContext('2d').drawImage(f.canvas, 0, 0, 72, 72);
        return { thumb: c.toDataURL(), delay: f.delay };
      }));
      setSelected(0);
      setFileName(file.name.replace(/\.[^.]+$/,'') + '.h');
      const name = file.name.replace(/\.[^.]+$/,'').replace(/\W/g,'_');
      setSettings(s => ({ ...s, varName: name }));
      addToast(`${decoded.length} frame(s) loaded ✓`, 'success');
    } catch(err) {
      console.error(err);
      addToast('Failed to decode file: ' + err.message, 'error');
    } finally {
      setProcessing(false);
      setProgress(0);
    }
  }

  async function doConvert() {
    setProcessing(true);
    setProgress(0);
    try {
      const { width:tw, height:th, varName, colorMode } = settings;
      const rgb565Frames = rawFrames.map((f, i) => {
        setProgress((i+1)/rawFrames.length);
        const dst = applyPixelTransform(f.canvas, tw, th, colorMode);
        if (colorMode === 'bgr565') {
          const ctx = dst.getContext('2d');
          const id = ctx.getImageData(0,0,tw,th);
          const out = [];
          for (let j=0;j<id.data.length;j+=4)
            out.push('0x'+rgb565(id.data[j+2],id.data[j+1],id.data[j]).toString(16).toUpperCase().padStart(4,'0'));
          return out;
        }
        return canvasToRgb565(dst, tw, th);
      });
      const code = buildHeader(rgb565Frames, varName, tw, th);
      setOutput(code);
      addToast(`Converted ${rgb565Frames.length} frame(s) → ${(new Blob([code]).size/1024).toFixed(1)} KB`, 'success');
    } catch(err) {
      addToast('Conversion error: ' + err.message, 'error');
    } finally {
      setProcessing(false);
      setProgress(0);
    }
  }

  function download() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([output], {type:'text/plain'}));
    a.download = fileName || settings.varName + '.h';
    a.click();
  }

  function copyCode() {
    navigator.clipboard.writeText(output).then(() => addToast('Copied to clipboard!', 'info'));
  }

  const hasFrames = rawFrames.length > 0;
  const W = rawFrames[0]?.canvas.width ?? '—';
  const H = rawFrames[0]?.canvas.height ?? '—';

  return (
    <div className="gap">
      <div className="card">
        <div className="card-title">1 · Drop or Select File</div>
        <DropZone onFile={handleFile} disabled={processing} />
        {processing && (
          <div style={{marginTop:16,textAlign:'center'}}>
            <div className="spinner"/>
            <div className="progress-bar-wrap" style={{marginTop:10,maxWidth:300,margin:'10px auto 0'}}>
              <div className="progress-bar-fill" style={{width:`${Math.round(progress*100)||10}%`}}/>
            </div>
            <div style={{fontSize:'.78rem',color:'var(--muted)',marginTop:6}}>Processing…</div>
          </div>
        )}
      </div>

      {hasFrames && (
        <div className="card">
          <div className="card-title">2 · Frame Preview
            <span className="dim-badge" style={{marginLeft:12}}>{rawFrames.length} frames · {W}×{H}px source</span>
          </div>
          <div className="row" style={{gap:20}}>
            <div style={{flex:1,minWidth:200}}>
              <FrameStrip frames={thumbFrames} selected={selected} onSelect={setSelected} />
            </div>
            <div>
              <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:6,textAlign:'center'}}>
                Preview (scaled {settings.width}×{settings.height})
              </div>
              <div className="preview-wrap" style={{minHeight:80}}>
                <canvas ref={previewRef} style={{maxWidth:160,maxHeight:160}} />
              </div>
            </div>
          </div>
        </div>
      )}

      {hasFrames && (
        <div className="card">
          <div className="card-title">3 · Export Settings</div>
          <SettingsPanel s={settings} onChange={setSettings} />
          <div style={{marginTop:16}} className="btn-row">
            <button className="btn btn-primary" onClick={doConvert} disabled={processing}>
              ⚡ Convert to .h
            </button>
            <span style={{color:'var(--muted)',fontSize:'.78rem'}}>
              Output: {settings.width}×{settings.height} × {rawFrames.length} frames = {(settings.width*settings.height*rawFrames.length*2/1024).toFixed(1)} KB
            </span>
          </div>
        </div>
      )}

      {output && (
        <div className="card">
          <div className="card-title">4 · Generated Header</div>
          <OutputPanel
            code={output}
            filename={fileName}
            onDownload={download}
            onCopy={copyCode}
          />
        </div>
      )}
    </div>
  );
}

// ── Library Tab ──
function LibraryTab() {
  const [filter, setFilter] = useState('');
  const q = filter.toLowerCase();
  const filtered = GROUPS.map(g => ({
    ...g, items: g.items.filter(n => n.includes(q))
  })).filter(g => g.items.length > 0 || g.name.toLowerCase().includes(q));

  return (
    <div>
      <input className="filter-input" placeholder="🔍  Filter animations…" value={filter} onChange={e=>setFilter(e.target.value)} />
      <div className="library-grid">
        {filtered.map(g => (
          <div key={g.name} className="group-card">
            <div className="group-header" style={{background:g.bg,color:g.color}}>
              {g.name}
              <span style={{marginLeft:'auto',fontSize:'.72rem',opacity:.7,fontWeight:400}}>{g.items.length} files</span>
            </div>
            <div className="group-body">
              {g.items.map(name => (
                <span key={name} className="anim-chip"
                  style={{borderColor:`${g.color}33`,color:q&&name.includes(q)?g.color:'var(--muted)'}}
                  title={`../SablinaTamagotchi_1.0/${name}.h`}
                >{name}</span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── About Tab ──
function AboutTab() {
  const specs = [
    ['Pixel format','RGB565 (16-bit unsigned short)'],
    ['Default resolution','100×100 px = 10 000 pixels/frame'],
    ['PROGMEM type','const unsigned short PROGMEM name[][SIZE]'],
    ['GIF support','Full multi-frame, palette & transparency'],
    ['Video support','MP4, WebM, MOV,frame sampling by FPS'],
    ['Image support','PNG, JPG,single frame'],
    ['Color modes','RGB565 · BGR565 · Grayscale→565'],
    ['Output','Ready-to-include C header (.h)'],
  ];
  return (
    <div className="card">
      <div className="card-title">Format Reference</div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.83rem'}}>
        <tbody>
          {specs.map(([k,v]) => (
            <tr key={k} style={{borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'8px 12px',color:'var(--accent)',fontFamily:'monospace',whiteSpace:'nowrap'}}>{k}</td>
              <td style={{padding:'8px 12px',color:'var(--muted)'}}>{v}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{marginTop:20,padding:14,background:'var(--s2)',borderRadius:10,fontFamily:'monospace',fontSize:'.74rem',color:'#c9d1d9',lineHeight:1.7}}>
        {`// Example output\nconst unsigned short PROGMEM myanim[][10000] = {\n  {0xF800,0x07E0,0x001F,...},  // frame 1\n  {0xFFFF,0x0000,0xF81F,...},  // frame 2\n};`}
      </div>
      <div style={{marginTop:16,color:'var(--muted)',fontSize:'.8rem',lineHeight:1.6}}>
        <b style={{color:'var(--text)'}}>Usage in Arduino/ESP-IDF:</b><br/>
        Include the generated <code style={{color:'var(--accent)'}}>.h</code> file and pass the array to your sprite renderer.
        Each frame is drawn by looping over the <code style={{color:'var(--accent)'}}>uint16_t</code> values and writing them
        to the display via <code style={{color:'var(--accent)'}}>tft.drawPixel()</code> or DMA burst transfer.
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [tab, setTab] = useState('convert');
  const [toasts, setToasts] = useState([]);

  function addToast(msg, type='info') {
    const id = Date.now();
    setToasts(prev => [...prev, {id,msg,type}]);
    setTimeout(() => setToasts(prev => prev.filter(t=>t.id!==id)), 3500);
  }

  return (
    <div className="app">
      <header className="app-header">
        <a href="./index.html" className="back-btn">← Simulator</a>
        <h1 className="app-title">✨ Sablina Animation Studio</h1>
        <span className="subtitle">ESP32 · RGB565 converter · Three.js · React</span>
      </header>

      <div className="tabs">
        {[['convert','⚡ Convert'],['library','📂 Library'],['about','📖 Format']].map(([id,label])=>(
          <button key={id} className={`tab-btn${tab===id?' active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab === 'convert'  && <ConvertTab addToast={addToast} />}
      {tab === 'library'  && <LibraryTab />}
      {tab === 'about'    && <AboutTab />}

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
